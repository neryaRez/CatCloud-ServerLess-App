name: Deploy CatCloud

on:
  workflow_dispatch:
    inputs:
      notification_email:
        description: "Email address for SNS notifications"
        required: true
        type: string
      invoke_lambda_after_deploy:
        description: "Invoke Lambda after deployment for end-to-end verification"
        required: true
        default: true
        type: boolean

permissions:
  id-token: write
  contents: read

env:
  STACK_NAME: CatCloudStack
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  deploy:
    name: Deploy CatCloud Serverless App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install AWS CDK CLI
        run: npm install -g aws-cdk

      - name: Install Python dependencies
        working-directory: infra_aws_cdk
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          fi

      - name: Run unit tests
        working-directory: infra_aws_cdk
        run: pytest

      - name: Run CDK synth
        working-directory: infra_aws_cdk
        run: cdk synth -c notification_email="${{ inputs.notification_email }}"

      - name: Deploy CatCloudStack
        working-directory: infra_aws_cdk
        run: |
          cdk deploy "$STACK_NAME" \
            -c notification_email="${{ inputs.notification_email }}" \
            --require-approval never

      - name: Get S3 bucket name from CloudFormation outputs
        id: stack_outputs
        run: |
          BUCKET_NAME=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" \
            --query "Stacks[0].Outputs[?OutputKey=='CatCloudBucketName'].OutputValue" \
            --output text)

          if [ -z "$BUCKET_NAME" ] || [ "$BUCKET_NAME" = "None" ]; then
            echo "Error: Could not find CatCloudBucketName output."
            exit 1
          fi

          echo "Bucket name: $BUCKET_NAME"
          echo "bucket_name=$BUCKET_NAME" >> "$GITHUB_OUTPUT"

      - name: Wait for S3 bucket to be ready
        run: |
          BUCKET_NAME="${{ steps.stack_outputs.outputs.bucket_name }}"

          for i in {1..12}; do
            if aws s3api head-bucket \
              --bucket "$BUCKET_NAME" \
              --region "$AWS_REGION" >/dev/null 2>&1; then
              echo "Bucket is ready."
              exit 0
            fi

            echo "Bucket is not ready yet. Waiting 5 seconds..."
            sleep 5
          done

          echo "Error: Bucket was not ready after waiting."
          exit 1

      - name: Upload sample files to S3 using AWS CLI
        run: |
          BUCKET_NAME="${{ steps.stack_outputs.outputs.bucket_name }}"

          aws s3 sync sample_files/ "s3://$BUCKET_NAME/cat-images/" \
            --region "$AWS_REGION" \
            --delete

      - name: Verify uploaded files
        run: |
          BUCKET_NAME="${{ steps.stack_outputs.outputs.bucket_name }}"

          aws s3 ls "s3://$BUCKET_NAME/cat-images/" \
            --region "$AWS_REGION"

      - name: Invoke Lambda after deployment
        if: ${{ inputs.invoke_lambda_after_deploy }}
        run: |
          FUNCTION_NAME=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" \
            --query "Stacks[0].Outputs[?OutputKey=='CatCloudLambdaFunctionName'].OutputValue" \
            --output text)

          if [ -z "$FUNCTION_NAME" ] || [ "$FUNCTION_NAME" = "None" ]; then
            echo "Error: Could not find CatCloudLambdaFunctionName output."
            exit 1
          fi

          echo "Invoking Lambda function: $FUNCTION_NAME"

          aws lambda invoke \
            --function-name "$FUNCTION_NAME" \
            --cli-binary-format raw-in-base64-out \
            --payload file://test-events/manual-test-event.json \
            response.json \
            --region "$AWS_REGION"

          echo
          echo "Lambda response:"
          cat response.json